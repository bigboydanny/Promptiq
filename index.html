<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Promptiq — draft sharper prompts</title>
<meta name="description" content="Promptiq turns a rough idea into a precise, production ready prompt. Free prompt drafting desk with a saved library.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,72,400;0,72,500;0,72,600;1,72,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="grain"></div>

<header class="desk-header">
  <div class="masthead">
    <div class="brand">
      <span class="brand-mark">PQ</span>
      <span class="brand-name">Promptiq</span>
    </div>
    <p class="masthead-tag">a desk for sharper prompts &mdash; no fluff, no filler</p>
  </div>
  <button class="ledger-toggle" id="ledgerToggle" aria-expanded="false">
    My Prompts <span class="ledger-count" id="ledgerCount">0</span>
  </button>
</header>
<div class="masthead-rule"></div>

<main class="desk">

  <div class="ledger-backdrop" id="ledgerBackdrop"></div>

  <section class="ledger" id="ledger" aria-label="Saved prompts">
    <div class="ledger-head">
      <h2>My Prompts</h2>
      <p>Stored on this device</p>
    </div>
    <div class="ledger-list" id="ledgerList">
      <p class="ledger-empty">Nothing filed yet. Draft something and stamp it.</p>
    </div>
  </section>

  <section class="composer-wrap">

    <div class="seal" id="stampSeal">PQ&#8209;0001</div>

    <div class="composer glass" id="composerCard">
      <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="general">General</button>
        <button class="mode-btn" data-mode="persona">Persona</button>
      </div>
      <label for="ideaInput" class="composer-label" id="composerLabel">What are you trying to get an AI to do?</label>
      <textarea id="ideaInput" placeholder="e.g. I need a prompt that gets an AI to write cold emails for my landscaping business that don't sound like cold emails" rows="4"></textarea>
      <div class="composer-row">
        <button id="draftBtn" class="primary-btn">Draft it</button>
        <span class="hint" id="composerHint"></span>
      </div>
    </div>

    <div class="thread" id="thread"></div>

    <div class="manuscript glass hidden" id="manuscript">
      <div class="manuscript-head">
        <span class="manuscript-tag">FINAL PROMPT</span>
        <div class="manuscript-actions">
          <button id="copyBtn" class="ghost-btn">Copy</button>
          <button id="saveBtn" class="ghost-btn">File this</button>
        </div>
      </div>
      <pre id="manuscriptText"></pre>
    </div>

  </section>

</main>

<footer class="desk-footer">
  <p>Promptiq &middot; drafted, not generated by template</p>
</footer>

<div class="rename-overlay hidden" id="renameOverlay">
  <div class="rename-box glass">
    <p>Name this prompt</p>
    <input type="text" id="renameInput" maxlength="48" placeholder="Landscaping cold email">
    <div class="rename-actions">
      <button id="renameCancel" class="ghost-btn">Cancel</button>
      <button id="renameConfirm" class="primary-btn">File it</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
